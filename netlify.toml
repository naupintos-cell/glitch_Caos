[build]
  base    = "frontend"
  publish = "frontend"

# Redirige todas las rutas al index.html (SPA behavior)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
